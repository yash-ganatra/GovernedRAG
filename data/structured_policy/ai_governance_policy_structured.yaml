    iso_42001: "Clause 5.2 (AI Policy — transparency)"

  - requirement: "Human oversight"
    eu_ai_act: "Article 14"
    gdpr: "Article 22(3) — right to human intervention"
    nist_rmf: "GV-6.2 (contingency processes)"
