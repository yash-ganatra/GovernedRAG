  - requirement: "Bias and fairness assessment"
    eu_ai_act: "Article 13(3)(b) — demographic performance"
    gdpr: "Article 22 — non-discrimination in automated decisions"
    nist_rmf: "MS-2.5, MS-2.11"
    iso_42001: "Clause 6.1.2 — fairness risk category"

  - requirement: "Privacy by design"
    eu_ai_act: "Article 10 — data governance for training data"
    gdpr: "Article 25 — data protection by design"
    nist_rmf: "MS-2.10"
    iso_42001: "Clause 8.4 — design and development"

  - requirement: "Incident response"
